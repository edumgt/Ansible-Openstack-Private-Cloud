---
- name: "CodespacesýÜę Keystone/Nova Mock ýĄÇŰ╣ä"
  hosts: all
  become: false
  gather_facts: true
  vars:
    lecture_id: "lecture22"
    lecture_title: "CodespacesýÜę Keystone/Nova Mock ýĄÇŰ╣ä"
    install_enabled: false
    reference_playbook: "../ansible/playbooks/00_ping.yml"
    workspace_root: "{{ playbook_dir }}/.."
    codespaces_venv_path: "{{ workspace_root }}/.venv"
    requirements_file: "{{ workspace_root }}/requirements-codespaces.txt"
    mock_state_dir: "{{ workspace_root }}/.lab/openstack-mock"
    mock_server_pid_path: "{{ mock_state_dir }}/server.pid"
    mock_server_log_path: "{{ mock_state_dir }}/server.log"
    keystone_admin_openrc_path: "{{ workspace_root }}/.lab/keystone-admin-openrc"
    keystone_admin_auth:
      OS_AUTH_URL: "http://127.0.0.1:5000/v3"
      OS_USERNAME: "admin"
      OS_PASSWORD: "123456"
      OS_PROJECT_NAME: "admin"
      OS_USER_DOMAIN_NAME: "Default"
      OS_PROJECT_DOMAIN_NAME: "Default"
      OS_REGION_NAME: "RegionOne"
      OS_INTERFACE: "public"
      OS_IDENTITY_API_VERSION: "3"
  tasks:
    - name: Show lecture context
      ansible.builtin.debug:
        msg:
          - "id={{ lecture_id }}"
          - "title={{ lecture_title }}"
          - "reference_playbook={{ reference_playbook }}"
          - "install_enabled={{ install_enabled }}"
          - "workspace_root={{ workspace_root }}"
          - "openrc={{ keystone_admin_openrc_path }}"

    - name: Ensure lab state directory exists
      ansible.builtin.file:
        path: "{{ mock_state_dir }}"
        state: directory
        mode: "0755"

    - name: Install Codespaces practice packages when enabled
      ansible.builtin.pip:
        requirements: "{{ requirements_file }}"
        virtualenv: "{{ codespaces_venv_path }}"
        virtualenv_command: "python3 -m venv"
      when: install_enabled | bool

    - name: Check OpenStack CLI in workspace venv
      ansible.builtin.command: "{{ codespaces_venv_path }}/bin/openstack --version"
      register: openstack_version
      changed_when: false
      failed_when: false

    - name: Print OpenStack CLI summary
      ansible.builtin.debug:
        msg:
          - "openstack_rc={{ openstack_version.rc }}"
          - "openstack={{ openstack_version.stdout | default(openstack_version.stderr, true) | default('not-installed', true) }}"

    - name: Write Keystone admin openrc template
      ansible.builtin.copy:
        dest: "{{ keystone_admin_openrc_path }}"
        mode: "0600"
        content: |
          export OS_AUTH_URL={{ keystone_admin_auth.OS_AUTH_URL }}
          export OS_USERNAME={{ keystone_admin_auth.OS_USERNAME }}
          export OS_PASSWORD={{ keystone_admin_auth.OS_PASSWORD }}
          export OS_PROJECT_NAME={{ keystone_admin_auth.OS_PROJECT_NAME }}
          export OS_USER_DOMAIN_NAME={{ keystone_admin_auth.OS_USER_DOMAIN_NAME }}
          export OS_PROJECT_DOMAIN_NAME={{ keystone_admin_auth.OS_PROJECT_DOMAIN_NAME }}
          export OS_REGION_NAME={{ keystone_admin_auth.OS_REGION_NAME }}
          export OS_INTERFACE={{ keystone_admin_auth.OS_INTERFACE }}
          export OS_IDENTITY_API_VERSION={{ keystone_admin_auth.OS_IDENTITY_API_VERSION }}

    - name: Start mock Keystone and Nova API
      ansible.builtin.command:
        argv:
          - "{{ workspace_root }}/scripts/start_mock_openstack.sh"
          - "{{ workspace_root }}"
      register: mock_server_start
      changed_when: "'started' in (mock_server_start.stdout | default('', true))"

    - name: Wait for mock Keystone endpoint
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: 5000
        timeout: 10

    - name: Check mock health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:5000/healthz"
        return_content: true
      register: mock_health

    - name: Print mock health summary
      ansible.builtin.debug:
        msg:
          - "mock_status={{ mock_health.json.status | default('unknown', true) }}"
          - "mock_keystone={{ mock_health.json.services.keystone | default('n/a', true) }}"
          - "mock_nova={{ mock_health.json.services.nova | default('n/a', true) }}"
          - "pid_file={{ mock_server_pid_path }}"
          - "log_file={{ mock_server_log_path }}"

    - name: Print next step guide
      ansible.builtin.debug:
        msg:
          - "source {{ keystone_admin_openrc_path }}"
          - "{{ codespaces_venv_path }}/bin/openstack token issue"
          - "ansible-playbook -i ansible/inventories/local/hosts.ini lecture21/playbook.yml -e install_enabled=false"
