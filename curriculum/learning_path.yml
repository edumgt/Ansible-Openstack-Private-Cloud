course:
  name: Ansible-First Local Cloud Lab (45 Lectures)
  language: ko-KR
  total_lectures: 45
  default_inventory: ../inventories/local/hosts.ini
  policy:
  - Ansible 자동화를 중심으로 OpenStack 운영 실습까지 단계적으로 확장한다.
  - 각 강의는 lecture.yml + playbook.yml 조합으로 진행한다.
  - 모든 강의는 60분(오프닝 5분, 핵심 작업 45분, 정리 10분) 기준으로 운영한다.
  - AI 코치 프롬프트를 매 강의에서 사용해 실습 속도를 높인다.
modules:
- range: lecture01-lecture10
  name: Ansible Foundation
  outcome: 인벤토리/변수/템플릿/Role 중심 자동화 기초 확립
- range: lecture11-lecture18
  name: Ansible Operations
  outcome: 서비스 배포/보안 점검/운영 자동화 패턴 습득
- range: lecture19-lecture25
  name: Ansible Cloud Bridge
  outcome: 클라우드 자원 자동화 경험과 OpenStack 전환 기반 확보
- range: lecture26-lecture35
  name: OpenStack Foundation with Ansible
  outcome: Keystone/Glance/Nova/Neutron/Cinder 핵심 자동화 학습
- range: lecture36-lecture42
  name: OpenStack Operations with Ansible
  outcome: 운영 점검/로그/쿼터/Kolla Ansible 배포 자동화 역량 강화
- range: lecture43-lecture45
  name: OpenStack Hands-on Capstone
  outcome: MicroStack/DevStack/Kolla Ansible 실습으로 운영 관점 완성
lectures:
- id: lecture01
  title: Ansible 학습환경 진단과 컨트롤 노드 준비
  module: ansible_foundation
  folder: ./lecture01
  lecture_file: ./lecture01/lecture.yml
  playbook_file: ./lecture01/playbook.yml
  reference_playbook: ../playbooks/00_ping.yml
  default_run: ansible-playbook -i ../inventories/local/hosts.ini ./lecture01/playbook.yml
  advanced_track_id: 12-3
  advanced_track_name: GitHub Actions 기반 CI 추가
