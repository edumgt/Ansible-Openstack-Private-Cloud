lecture:
  id: lecture43
  order: 43
  title: 'OpenStack 입문 1: MicroStack 단일노드 실습'
  module: openstack_hands_on
  level: beginner
  duration_minutes: 60
  tags:
  - openstack
  - microstack
  - horizon
prerequisites:
- lecture42 완료 또는 동등한 실무 경험
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- 'OpenStack 입문 1: MicroStack 단일노드 실습 주제를 Ansible 중심으로 설명할 수 있다.'
- 강의별 설치 및 점검 절차를 YAML 문서 기반으로 수행할 수 있다.
- 실습 결과를 AI 코치 프롬프트로 리뷰하고 개선할 수 있다.
curriculum:
  session_flow:
  - "오프닝 5분: 목표와 검증 기준 확인"
  - "핵심 작업 45분: 플레이북 실행, 결과 점검, 오류 수정"
  - "마무리 10분: 실행 로그 정리와 다음 강의 연결"
tech_stack:
  required:
  - ansible-core
  - openstack
  - openstack-cli
  - kolla-ansible
  optional:
  - microstack
  - devstack
  - horizon
installation_plan:
  target_inventory: ../../inventories/local/hosts.ini
  target_host_group: all
  approach:
  - '사전 점검: Python/SSH/권한 확인'
  - 필수 패키지 설치는 playbook.yml에서 install_enabled=true일 때 실행
  - 강의 종료 후 상태 점검 태스크로 검증
  packages:
  - python3
  - snapd
  - curl
  - jq
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../../playbooks/00_ping.yml
  run_examples:
  - ansible-playbook -i ../../inventories/local/hosts.ini ./playbook.yml
  - ansible-playbook -i ../../inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../../inventories/local/hosts.ini ../../playbooks/00_ping.yml
ai_pairing:
  pre_lab_prompt: 'OpenStack 입문 1: MicroStack 단일노드 실습 실습 전에 실패할 수 있는 지점
    3개를 체크리스트로 만들어줘.'
  during_lab_prompt: 현재 실행 로그를 보고 원인-증상-조치 순서로 트러블슈팅 가이드를 작성해줘.
  retrospective_prompt: 이번 강의에서 배운 자동화 패턴을 다음 강의에 재사용할 수 있게 YAML 템플릿으로 정리해줘.
deliverables:
- 강의 실행 로그 또는 스크린샷 1개 이상
- AI 회고 노트(markdown) 1개
validation:
- playbook syntax error 없음
- 핵심 태스크 결과를 debug 출력으로 확인
advanced_integration:
  track_id: 12-7
  track_name: OpenStack 입문 체험(MicroStack/DevStack/Kolla Ansible)
  track_doc: ../../curriculum/advanced_tracks.yml
  integration_objective: 'OpenStack 입문 1: MicroStack 단일노드 실습 학습 결과를 OpenStack
    입문 체험(MicroStack/DevStack/Kolla Ansible) 시나리오와 연결한다.'
  addon_practice:
  - MicroStack 단일 노드 설치 후 첫 VM 생성
  - Horizon 로그인 후 Instances/Networks/Floating IPs 확인
  developer_view:
    backend: VM 생성과 네트워크 생성이 어떤 제어 서비스와 연결되는지 파악
    frontend: Horizon 화면에서 리소스 관계를 시각적으로 빠르게 이해
  aws_bridge: Horizon 메뉴와 Nova/Neutron/Cinder 흐름을 AWS Console/EC2/VPC/EBS로 대응해 본다.
  recommended_advanced_order:
  - 12-1
  - 12-5
  - 12-4
  - 12-3
  - 12-2
  - 12-6
  - 12-7
  - 12-8
  ai_extension_prompt: '현재 강의(OpenStack 입문 1: MicroStack 단일노드 실습) 결과를 MicroStack/DevStack/Kolla
    Ansible 비교표로 작성해줘.'
