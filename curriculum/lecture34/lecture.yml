lecture:
  id: lecture34
  order: 34
  title: Cinder 볼륨 생성/연결 자동화
  module: openstack_foundation
  level: intermediate
  duration_minutes: 60
  tags:
  - openstack
  - ansible
  - foundation
prerequisites:
- lecture33 완료 또는 동등한 실무 경험
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- Cinder 볼륨 생성/연결 자동화 주제를 Ansible 중심으로 설명할 수 있다.
- 강의별 설치 및 점검 절차를 YAML 문서 기반으로 수행할 수 있다.
- 실습 결과를 AI 코치 프롬프트로 리뷰하고 개선할 수 있다.
curriculum:
  session_flow:
  - "오프닝 5분: 목표와 검증 기준 확인"
  - "핵심 작업 45분: 플레이북 실행, 결과 점검, 오류 수정"
  - "마무리 10분: 실행 로그 정리와 다음 강의 연결"
tech_stack:
  required:
  - ansible-core
  - openstack
  - openstack-cli
  - openstacksdk
  optional:
  - horizon
  - microstack
  - devstack
installation_plan:
  target_inventory: ../../inventories/local/hosts.ini
  target_host_group: all
  approach:
  - '사전 점검: Python/SSH/권한 확인'
  - 필수 패키지 설치는 playbook.yml에서 install_enabled=true일 때 실행
  - 강의 종료 후 상태 점검 태스크로 검증
  packages:
  - python3
  - curl
  - jq
  - ca-certificates
  - apt-transport-https
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../../playbooks/10_docker_engine_install.yml
  run_examples:
  - ansible-playbook -i ../../inventories/local/hosts.ini ./playbook.yml
  - ansible-playbook -i ../../inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../../inventories/local/hosts.ini ../../playbooks/10_docker_engine_install.yml
ai_pairing:
  pre_lab_prompt: Cinder 볼륨 생성/연결 자동화 실습 전에 실패할 수 있는 지점 3개를 체크리스트로 만들어줘.
  during_lab_prompt: 현재 실행 로그를 보고 원인-증상-조치 순서로 트러블슈팅 가이드를 작성해줘.
  retrospective_prompt: 이번 강의에서 배운 자동화 패턴을 다음 강의에 재사용할 수 있게 YAML 템플릿으로 정리해줘.
deliverables:
- 강의 실행 로그 또는 스크린샷 1개 이상
- AI 회고 노트(markdown) 1개
validation:
- playbook syntax error 없음
- 핵심 태스크 결과를 debug 출력으로 확인
advanced_integration:
  track_id: 12-7
  track_name: OpenStack 입문 체험(MicroStack/DevStack/Kolla Ansible)
  track_doc: ../../curriculum/advanced_tracks.yml
  integration_objective: 현재 강의 결과를 OpenStack 입문 체험 순서(MicroStack -> DevStack -> Kolla Ansible)와 연결한다.
  addon_practice:
  - MicroStack/DevStack/Kolla Ansible 관점에서 동일 리소스 흐름 비교
  - Horizon 화면과 Keystone/Nova/Neutron/Cinder 서비스 매핑
  developer_view:
    backend: 제어 평면 서비스 호출 흐름을 추적해 자동화 안정성을 높인다.
    frontend: Horizon UI 상태와 실제 리소스 상태를 함께 검증한다.
  aws_bridge: OpenStack 리소스 흐름을 AWS EC2/VPC/EBS/IAM과 매핑해 비교한다.
  recommended_advanced_order:
  - 12-7
  - 12-3
  - 12-6
  ai_extension_prompt: 현재 강의 결과를 MicroStack -> DevStack -> Kolla Ansible 순서로 확장하는 체크리스트를 YAML로 작성해줘.
