- name: 'OpenStack 입문 2: DevStack 단일 머신 학습 흐름'
  hosts: all
  become: true
  gather_facts: true
  vars:
    lecture_id: lecture44
    lecture_title: 'OpenStack 입문 2: DevStack 단일 머신 학습 흐름'
    install_enabled: false
    reference_playbook: ../../playbooks/00_bootstrap.yml
    lecture_packages:
    - python3
    - git
    - curl
    - jq
  tasks:
  - name: Show lecture context
    ansible.builtin.debug:
      msg:
      - id={{ lecture_id }}
      - title={{ lecture_title }}
      - reference_playbook={{ reference_playbook }}
      - install_enabled={{ install_enabled }}
  - name: Install lecture packages when enabled
    ansible.builtin.package:
      name: '{{ lecture_packages }}'
      state: present
    when: install_enabled | bool
  - name: Check Python3 availability
    ansible.builtin.command: python3 --version
    register: python_version
    changed_when: false
    failed_when: false
  - name: Print Python3 version
    ansible.builtin.debug:
      var: python_version.stdout
