name: Docker Publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.prep.outputs.image_repo }}
      image_latest: ${{ steps.prep.outputs.image_latest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image repository
        id: prep
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "DOCKERHUB_USERNAME secret is required." >&2
            exit 1
          fi
          REPO="${DOCKERHUB_REPOSITORY:-python-ansible-playbook}"
          echo "image_repo=docker.io/${DOCKERHUB_USERNAME}/${REPO}" >> "${GITHUB_OUTPUT}"
          echo "image_latest=docker.io/${DOCKERHUB_USERNAME}/${REPO}:latest" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_repo }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  sync-local-docker:
    name: Sync Local Docker (self-hosted)
    needs: docker-publish
    if: ${{ vars.ENABLE_LOCAL_DOCKER_SYNC == 'true' && github.ref == 'refs/heads/main' }}
    runs-on: [self-hosted, linux, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest image and restart local container
        env:
          IMAGE: ${{ needs.docker-publish.outputs.image_latest }}
          CONTAINER_NAME: ${{ vars.LOCAL_DOCKER_CONTAINER_NAME }}
          RUN_CMD: ${{ vars.LOCAL_DOCKER_RUN_CMD }}
        run: ./scripts/sync_local_docker.sh
