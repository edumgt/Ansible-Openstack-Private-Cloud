advanced_tracks:
  description: 기본 45강 이후 실무형 확장을 위한 선택 심화 트랙
  tracks:
  - id: 12-1
    name: Docker Compose 추가
    learning_purpose:
    - 여러 컨테이너를 하나의 애플리케이션 스택처럼 함께 실행하는 방법을 익힌다.
    - 백엔드, 프론트엔드, DB, Redis를 하나의 개발/테스트 환경으로 구성한다.
    - ECS/Kubernetes 멀티서비스 배포 개념으로 확장할 수 있다.
    learning_topics:
    - docker compose 기본 구조
    - services, ports, volumes, environment, depends_on
    - 멀티컨테이너 애플리케이션 구성
    - .env 파일 기반 설정 분리
    practice_examples:
    - frontend + backend + postgres + redis 구성
    - docker-compose.yml 작성과 일괄 기동/중지
    - 서비스 간 네트워크 및 의존관계 확인
    developer_view:
      backend: API 서버 + DB + Redis를 한 번에 실행하는 구조 이해
      frontend: 정적 웹 + API + 인증/세션 백엔드 연결 구조 이해
    aws_links:
    - Compose 정의는 ECS Task 또는 Kubernetes 다중 리소스 분리 전 단계
    - Compose 네트워크는 서비스 간 내부 통신 구조 이해에 유효
    - Compose 볼륨은 영속 저장소 개념 이해에 유효
  - id: 12-2
    name: Helm Chart 추가
    learning_purpose:
    - Kubernetes 리소스를 패키지처럼 배포하는 방식을 이해한다.
    - dev/stage/prod 설정을 values 파일로 분리하는 방법을 익힌다.
    learning_topics:
    - Helm 개념
    - Chart 구조
    - templates, values.yaml, Chart.yaml
    - 환경별 값 분리
    practice_examples:
    - backend/frontend Helm Chart 작성
    - values-dev.yaml / values-prod.yaml 분리
    - replica, image tag, environment 값 변경 실습
    developer_view:
      backend: DB 접속정보, replica, tag 버전 관리 자동화
      frontend: API endpoint, ingress host, static 서비스 설정 관리
    aws_links:
    - Helm은 EKS 운영에서 가장 자주 접하는 패키지형 배포 도구
    - GitOps/Argo CD/배포 표준화로 확장 가능
  - id: 12-3
    name: GitHub Actions 기반 CI 추가
    learning_purpose:
    - 코드 변경 후 테스트/빌드/배포 준비를 자동 수행하는 CI 흐름을 익힌다.
    - Git 기반 협업과 배포 자동화 개념을 이해한다.
    learning_topics:
    - workflow, job, step 구조
    - Docker image build 자동화
    - 테스트 자동화
    - artifact와 registry push 개념
    practice_examples:
    - backend push 시 테스트 실행
    - Docker image build 및 tag 자동 생성
    - 추후 ECR push 확장 가능한 workflow 설계
    developer_view:
      backend: merge 시 자동 테스트/빌드 파이프라인 이해
      frontend: 빌드 결과물 생성과 배포 자동화 이해
    aws_links:
    - GitHub Actions -> ECR push -> ECS/EKS 배포 흐름으로 확장 가능
    - CodeBuild/CodePipeline/Argo CD와 비교 가능
  - id: 12-4
    name: Nginx reverse proxy 심화
    learning_purpose:
    - 웹 서비스 앞단 reverse proxy 역할을 이해한다.
    - 프론트엔드/백엔드/API 라우팅 구조를 실무 관점으로 학습한다.
    learning_topics:
    - upstream 설정
    - location 기반 라우팅
    - gzip/cache/header 설정 기초
    - CORS/TLS 종료 기초
    practice_examples:
    - / -> frontend, /api -> backend 라우팅
    - 정적 리소스 캐싱 설정
    - 보안 헤더 및 에러 페이지 추가
    developer_view:
      backend: API 서버를 프록시 뒤에 배치하는 이유 이해
      frontend: SPA 라우팅/정적 캐싱/API 프록시 구조 이해
    aws_links:
    - ALB + Nginx + Ingress Controller 구조 이해의 기반
    - Ingress, CloudFront, API Gateway 개념으로 연결 가능
  - id: 12-5
    name: PostgreSQL / Redis 추가
    learning_purpose:
    - 상태 저장 계층을 포함한 서비스 아키텍처를 이해한다.
    - DB/캐시가 컨테이너/쿠버네티스에서 연결되는 방식을 체감한다.
    learning_topics:
    - PostgreSQL 역할
    - Redis 역할
    - 영속 데이터와 휘발성 데이터 차이
    - 세션/캐시/큐 기초
    practice_examples:
    - backend PostgreSQL 연동
    - Redis 캐시 또는 rate limit 실습
    - volume 기반 데이터 영속화 확인
    developer_view:
      backend: ORM/SQL 연결, 캐시 계층, 세션 저장 구조 이해
      frontend: API 응답 속도와 캐시 효과 체감
    aws_links:
    - PostgreSQL은 RDS/Aurora 이해 기반
    - Redis는 ElastiCache 이해 기반
    - Local volume은 영속 데이터 저장 개념의 시작
  - id: 12-6
    name: 모니터링(Prometheus/Grafana) 추가
    learning_purpose:
    - 운영 관점에서 상태 관찰과 문제 탐지 흐름을 익힌다.
    - 메트릭/대시보드/알림의 필요성을 이해한다.
    learning_topics:
    - Observability 기초
    - Prometheus scrape 구조
    - Grafana dashboard 기초
    - CPU/Memory/Request/Error Rate 관찰
    practice_examples:
    - k3s에 Prometheus/Grafana 배포
    - backend 메트릭 노출
    - 응답시간/에러율 시각화
    developer_view:
      backend: API 응답속도/에러율/리소스 사용률 확인
      frontend: 사용자 성능 저하 시 백엔드 상태 진단 흐름 이해
    aws_links:
    - CloudWatch, Managed Prometheus, Managed Grafana와 연결 가능
    - 장애대응/알람 설계 개념으로 확장 가능
  - id: 12-7
    name: OpenStack 입문 체험(MicroStack/DevStack/Kolla Ansible)
    learning_purpose:
    - 입문자 기준으로 OpenStack을 가장 가볍게 체험하는 순서를 익힌다.
    - Horizon에서 실제로 보이는 리소스와 백엔드 서비스(Nova/Neutron/Cinder)를 연결한다.
    - MicroStack, DevStack, Kolla Ansible 중 목적에 맞는 방식을 선택할 수 있다.
    learning_topics:
    - 'Horizon에서 보이는 메뉴: Instances, Images, Networks, Routers, Floating IPs, Volumes'
    - '서비스 역할 연결: Nova(컴퓨트), Neutron(네트워크), Cinder(블록 스토리지), Horizon(UI)'
    - '입문 체험 순서: MicroStack -> DevStack -> Kolla Ansible'
    - '배포 방식 비교: 단일 VM 방식, 개발용 스크립트 방식, 컨테이너+Ansible 방식'
    practice_examples:
    - MicroStack 단일 노드 설치 후 첫 VM과 Horizon 접속
    - DevStack 단일 머신 설치 후 provider/self-service 네트워크와 인스턴스 생성
    - Kolla Ansible all-in-one 배포 후 docker ps로 keystone/nova/neutron/horizon 서비스 확인
    developer_view:
      backend: VM 생성/네트워크/볼륨이 각각 어떤 제어 평면 서비스로 처리되는지 추적 가능
      frontend: Horizon 콘솔을 통해 리소스 상태를 시각적으로 확인하고 AWS Console과 대응 가능
    aws_links:
    - Horizon 화면 흐름은 AWS Console(EC2/VPC/EBS) 탐색 방식과 유사
    - Neutron 라우터/네트워크/보안그룹은 VPC/Subnet/Route/SG 이해 강화에 직접적
    - Kolla Ansible은 OpenStack 제어평면을 컨테이너/Ansible로 운영하는 관점을 제공
    beginner_path:
      step1: 'MicroStack: 가장 빠르게 Horizon과 VM 생성 흐름 체험'
      step2: 'DevStack: 서비스 구성과 CLI 중심의 설치/문제해결 경험'
      step3: 'Kolla Ansible: OpenStack 서비스를 컨테이너로 배포/운영 관점 체험'
    what_you_will_see:
      horizon:
      - Projects
      - Instances
      - Images
      - Networks
      - Routers
      - Floating IPs
      - Volumes
      service_mapping:
      - Nova = VM 생성
      - Neutron = 네트워크/라우터/Floating IP
      - Cinder = 볼륨
      - Horizon = 위 리소스를 보는 대시보드
      kolla_containers_examples:
      - keystone
      - nova-api
      - neutron-server
      - glance-api
      - horizon
      - mariadb
      - rabbitmq
      - memcached
    official_docs:
    - title: MicroStack Single-node quickstart
      url: https://canonical.com/microstack/docs/single-node
      note: openstack snap 설치 -> prepare-node -> bootstrap -> configure -> 첫 VM 실행
    - title: OpenStack Horizon (latest docs)
      url: https://docs.openstack.org/horizon/latest/
      note: Horizon은 OpenStack 대시보드의 canonical implementation
    - title: OpenStack DevStack (latest docs)
      url: https://docs.openstack.org/devstack/latest/
      note: 최신 git 기반 OpenStack 개발/테스트 환경을 빠르게 구성
    - title: OpenStack Install Guide - Launch instance
      url: https://docs.openstack.org/install-guide/launch-instance.html
      note: provider/self-service network, key pair, security group 후 인스턴스 생성 흐름
    - title: Kolla Ansible Quick Start (deployment/evaluation)
      url: https://docs.openstack.org/kolla-ansible/latest/user/quickstart.html
      note: 베어메탈/VM에 OpenStack을 컨테이너+Ansible로 배포
    - title: Kolla Ansible project overview
      url: https://www.openstack.org/software/releases/caracal/components/kolla-ansible
      note: Kolla Ansible은 containerised OpenStack control plane 배포를 목표로 함
    method_comparison:
      microstack:
        best_for: 가장 빠른 입문 체험
        how_it_feels: 단일 Ubuntu 머신에서 Horizon/VM까지 바로 확인
        difficulty: 낮음
        tradeoff: 실운영 멀티노드 구조 학습에는 제한
      devstack:
        best_for: 학습/개발용 표준 체험
        how_it_feels: 서비스 설치/구성/CLI 흐름을 깊게 체험
        difficulty: 중간
        tradeoff: 실패 복구/재설정까지 학습해야 함
      kolla_ansible:
        best_for: Docker+Ansible 관점의 OpenStack 배포 구조 학습
        how_it_feels: OpenStack 서비스가 컨테이너 단위로 어떻게 구성되는지 확인
        difficulty: 중상
        tradeoff: 입문 최소 체험 용도만으로는 과할 수 있음
  - id: 12-8
    name: k3s 대신 kubeadm 또는 managed EKS 확장 비교
    learning_purpose:
    - k3s/kubeadm/EKS 차이를 이해한다.
    - 실습용 환경과 운영용 환경의 차이를 비교한다.
    learning_topics:
    - k3s 장점과 한계
    - kubeadm 구조
    - Managed Kubernetes(EKS) 운영 모델
    - control plane 관리 주체/운영 난이도/비용 비교
    practice_examples:
    - 같은 앱의 k3s 배포 검증
    - kubeadm 설치 흐름 비교 정리
    - EKS에서 AWS 관리 영역과 사용자 관리 영역 분리 정리
    developer_view:
      backend: 내 앱에서 내가 관리할 범위의 경계 이해
      frontend: 배포 대상 변화와 운영 책임 경계 변화 이해
    aws_links:
    - k3s는 쿠버네티스 개념 학습용
    - kubeadm은 내부 구조 심화용
    - EKS는 AWS 실무 운영 연결용
    comparison:
      k3s:
        purpose: 경량 실습/엣지/소규모
        install_difficulty: 낮음
        ops_burden: 낮음
        learning_fit: 매우 좋음
        management_owner: 사용자
        cost: 로컬 자원 중심
      kubeadm:
        purpose: 표준 쿠버네티스 직접 구축
        install_difficulty: 높음
        ops_burden: 높음
        learning_fit: 깊이 있는 학습에 좋음
        management_owner: 사용자
        cost: 로컬/추가 인프라 필요
      amazon_eks:
        purpose: 관리형 쿠버네티스
        install_difficulty: 중간
        ops_burden: control plane 부담 낮음
        learning_fit: AWS 실무 연결에 좋음
        management_owner: AWS + 사용자
        cost: AWS 사용 비용 발생
  recommended_order:
  - 12-1
  - 12-5
  - 12-4
  - 12-3
  - 12-2
  - 12-6
  - 12-7
  - 12-8
  final_goal:
  - 멀티서비스 아키텍처를 설명하고 운영 기준을 수립할 수 있다.
  - 로컬 컨테이너 환경과 쿠버네티스 환경의 차이를 설명할 수 있다.
  - 네트워크/프록시/DB/캐시/모니터링/자동화를 포함한 전체 구조를 이해한다.
  - AWS EC2, RDS, ElastiCache, ALB, ECR, ECS, EKS, CloudWatch 역할을 연결해 설명할 수 있다.
