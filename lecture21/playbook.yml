---
- name: "OpenStack/Nova 기본 점검"
  hosts: all
  become: false
  gather_facts: true
  vars:
    lecture_id: "lecture21"
    lecture_title: "OpenStack/Nova 기본 점검"
    install_enabled: false
    reference_playbook: "../ansible/playbooks/00_ping.yml"
    workspace_root: "{{ playbook_dir }}/.."
    codespaces_venv_path: "{{ workspace_root }}/.venv"
    requirements_file: "{{ workspace_root }}/requirements-codespaces.txt"
    use_mock_openstack_auth: true
    openstack_mock_auth:
      OS_AUTH_URL: "http://127.0.0.1:5000/v3"
      OS_USERNAME: "admin"
      OS_PASSWORD: "123456"
      OS_PROJECT_NAME: "admin"
      OS_USER_DOMAIN_NAME: "Default"
      OS_PROJECT_DOMAIN_NAME: "Default"
      OS_REGION_NAME: "RegionOne"
      OS_INTERFACE: "public"
      OS_IDENTITY_API_VERSION: "3"
    openstack_cli_env:
      OS_CLOUD: "{{ lookup('ansible.builtin.env', 'OS_CLOUD') | default('', true) }}"
      OS_AUTH_URL: "{{ lookup('ansible.builtin.env', 'OS_AUTH_URL') | default((openstack_mock_auth.OS_AUTH_URL if use_mock_openstack_auth else ''), true) }}"
      OS_USERNAME: "{{ lookup('ansible.builtin.env', 'OS_USERNAME') | default((openstack_mock_auth.OS_USERNAME if use_mock_openstack_auth else ''), true) }}"
      OS_PASSWORD: "{{ lookup('ansible.builtin.env', 'OS_PASSWORD') | default((openstack_mock_auth.OS_PASSWORD if use_mock_openstack_auth else ''), true) }}"
      OS_PROJECT_NAME: "{{ lookup('ansible.builtin.env', 'OS_PROJECT_NAME') | default((openstack_mock_auth.OS_PROJECT_NAME if use_mock_openstack_auth else ''), true) }}"
      OS_USER_DOMAIN_NAME: "{{ lookup('ansible.builtin.env', 'OS_USER_DOMAIN_NAME') | default((openstack_mock_auth.OS_USER_DOMAIN_NAME if use_mock_openstack_auth else ''), true) }}"
      OS_PROJECT_DOMAIN_NAME: "{{ lookup('ansible.builtin.env', 'OS_PROJECT_DOMAIN_NAME') | default((openstack_mock_auth.OS_PROJECT_DOMAIN_NAME if use_mock_openstack_auth else ''), true) }}"
      OS_REGION_NAME: "{{ lookup('ansible.builtin.env', 'OS_REGION_NAME') | default((openstack_mock_auth.OS_REGION_NAME if use_mock_openstack_auth else ''), true) }}"
      OS_INTERFACE: "{{ lookup('ansible.builtin.env', 'OS_INTERFACE') | default((openstack_mock_auth.OS_INTERFACE if use_mock_openstack_auth else ''), true) }}"
      OS_IDENTITY_API_VERSION: "{{ lookup('ansible.builtin.env', 'OS_IDENTITY_API_VERSION') | default((openstack_mock_auth.OS_IDENTITY_API_VERSION if use_mock_openstack_auth else ''), true) }}"
  tasks:
    - name: Show lecture context
      ansible.builtin.debug:
        msg:
          - "id={{ lecture_id }}"
          - "title={{ lecture_title }}"
          - "reference_playbook={{ reference_playbook }}"
          - "install_enabled={{ install_enabled }}"
          - "use_mock_openstack_auth={{ use_mock_openstack_auth }}"
          - "effective_os_auth_url={{ openstack_cli_env.OS_AUTH_URL | default('', true) }}"

    - name: Install Codespaces practice packages when enabled
      ansible.builtin.pip:
        requirements: "{{ requirements_file }}"
        virtualenv: "{{ codespaces_venv_path }}"
        virtualenv_command: "python3 -m venv"
      when: install_enabled | bool

    - name: Check Python3 availability
      ansible.builtin.command: python3 --version
      register: python_version
      changed_when: false
      failed_when: false

    - name: Print Python3 version
      ansible.builtin.debug:
        var: python_version.stdout

    - name: Check mock Keystone endpoint
      ansible.builtin.uri:
        url: "{{ openstack_cli_env.OS_AUTH_URL }}"
        return_content: true
      register: keystone_endpoint_check
      changed_when: false
      failed_when: false

    - name: Print mock Keystone summary
      ansible.builtin.debug:
        msg:
          - "keystone_http_status={{ keystone_endpoint_check.status | default('n/a', true) }}"
          - "keystone_endpoint_ok={{ keystone_endpoint_check.status == 200 if keystone_endpoint_check.status is defined else false }}"

    - name: Check OpenStack CLI availability
      ansible.builtin.command: "{{ codespaces_venv_path }}/bin/openstack --version"
      register: openstack_version
      changed_when: false
      failed_when: false

    - name: Print OpenStack CLI version
      ansible.builtin.debug:
        msg:
          - "openstack_rc={{ openstack_version.rc }}"
          - "openstack={{ openstack_version.stdout | default(openstack_version.stderr, true) | default('not-installed', true) }}"

    - name: Check OpenStack token issue
      ansible.builtin.command:
        argv:
          - "{{ codespaces_venv_path }}/bin/openstack"
          - token
          - issue
          - -f
          - value
          - -c
          - expires
      register: openstack_token_issue
      changed_when: false
      failed_when: false
      environment: "{{ openstack_cli_env }}"

    - name: Print OpenStack token summary
      ansible.builtin.debug:
        msg:
          - "token_rc={{ openstack_token_issue.rc }}"
          - "token_result={{ openstack_token_issue.stdout | default(openstack_token_issue.stderr, true) | default('auth-not-configured', true) }}"

    - name: Check Nova compute services
      ansible.builtin.command:
        argv:
          - "{{ codespaces_venv_path }}/bin/openstack"
          - compute
          - service
          - list
          - -f
          - value
          - -c
          - Binary
          - -c
          - Host
          - -c
          - State
          - -c
          - Status
      register: nova_compute_services
      changed_when: false
      failed_when: false
      environment: "{{ openstack_cli_env }}"

    - name: Print Nova compute services
      ansible.builtin.debug:
        msg:
          - "nova_service_rc={{ nova_compute_services.rc }}"
          - "nova_services={{ nova_compute_services.stdout_lines | default([nova_compute_services.stderr | default('nova-service-check-failed', true)], true) }}"

    - name: Check Nova hypervisors
      ansible.builtin.command:
        argv:
          - "{{ codespaces_venv_path }}/bin/openstack"
          - hypervisor
          - list
          - -f
          - value
          - -c
          - 'Hypervisor Hostname'
          - -c
          - State
          - -c
          - Status
      register: nova_hypervisors
      changed_when: false
      failed_when: false
      environment: "{{ openstack_cli_env }}"

    - name: Print Nova hypervisors
      ansible.builtin.debug:
        msg:
          - "hypervisor_rc={{ nova_hypervisors.rc }}"
          - "hypervisors={{ nova_hypervisors.stdout_lines | default([nova_hypervisors.stderr | default('hypervisor-check-failed', true)], true) }}"
