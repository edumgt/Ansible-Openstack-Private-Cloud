---
- name: "OpenStack/Nova 기본 점검"
  hosts: all
  become: false
  gather_facts: true
  vars:
    lecture_id: "lecture21"
    lecture_title: "OpenStack/Nova 기본 점검"
    install_enabled: false
    reference_playbook: "../ansible/playbooks/00_ping.yml"
    workspace_root: "{{ playbook_dir }}/.."
    codespaces_venv_path: "{{ workspace_root }}/.venv"
    requirements_file: "{{ workspace_root }}/requirements-codespaces.txt"
    openrc_path: "{{ workspace_root }}/.lab/keystone-admin-openrc"
    mock_keystone_port: 15000
    use_mock_openstack_auth: true
    openstack_mock_auth:
      OS_AUTH_URL: "http://127.0.0.1:{{ mock_keystone_port }}/v3"
      OS_USERNAME: "admin"
      OS_PASSWORD: "123456"
      OS_PROJECT_NAME: "admin"
      OS_USER_DOMAIN_NAME: "Default"
      OS_PROJECT_DOMAIN_NAME: "Default"
      OS_REGION_NAME: "RegionOne"
      OS_INTERFACE: "public"
      OS_IDENTITY_API_VERSION: "3"
  tasks:
    - name: Check lecture22 openrc presence
      ansible.builtin.stat:
        path: "{{ openrc_path }}"
      register: openrc_file

    - name: Load lecture22 openrc values
      ansible.builtin.slurp:
        path: "{{ openrc_path }}"
      register: openrc_content
      when: openrc_file.stat.exists

    - name: Prepare openrc export text
      ansible.builtin.set_fact:
        openrc_exports_text: "{{ (openrc_content.content | b64decode) if openrc_file.stat.exists else '' }}"

    - name: Build OpenStack CLI environment
      ansible.builtin.set_fact:
        openstack_cli_env:
          OS_CLOUD: "{{ lookup('ansible.builtin.env', 'OS_CLOUD') | default('', true) }}"
          OS_AUTH_URL: >-
            {{
              (openrc_exports_text | regex_findall('(?m)^export OS_AUTH_URL=(.*)$') | first)
              | default((openstack_mock_auth.OS_AUTH_URL if use_mock_openstack_auth else ''), true)
            }}
          OS_USERNAME: >-
            {{
              (openrc_exports_text | regex_findall('(?m)^export OS_USERNAME=(.*)$') | first)
              | default((openstack_mock_auth.OS_USERNAME if use_mock_openstack_auth else ''), true)
            }}
          OS_PASSWORD: >-
            {{
              (openrc_exports_text | regex_findall('(?m)^export OS_PASSWORD=(.*)$') | first)
              | default((openstack_mock_auth.OS_PASSWORD if use_mock_openstack_auth else ''), true)
            }}
          OS_PROJECT_NAME: >-
            {{
              (openrc_exports_text | regex_findall('(?m)^export OS_PROJECT_NAME=(.*)$') | first)
              | default((openstack_mock_auth.OS_PROJECT_NAME if use_mock_openstack_auth else ''), true)
            }}
          OS_USER_DOMAIN_NAME: >-
            {{
              (openrc_exports_text | regex_findall('(?m)^export OS_USER_DOMAIN_NAME=(.*)$') | first)
              | default((openstack_mock_auth.OS_USER_DOMAIN_NAME if use_mock_openstack_auth else ''), true)
            }}
          OS_PROJECT_DOMAIN_NAME: >-
            {{
              (openrc_exports_text | regex_findall('(?m)^export OS_PROJECT_DOMAIN_NAME=(.*)$') | first)
              | default((openstack_mock_auth.OS_PROJECT_DOMAIN_NAME if use_mock_openstack_auth else ''), true)
            }}
          OS_REGION_NAME: >-
            {{
              (openrc_exports_text | regex_findall('(?m)^export OS_REGION_NAME=(.*)$') | first)
              | default((openstack_mock_auth.OS_REGION_NAME if use_mock_openstack_auth else ''), true)
            }}
          OS_INTERFACE: >-
            {{
              (openrc_exports_text | regex_findall('(?m)^export OS_INTERFACE=(.*)$') | first)
              | default((openstack_mock_auth.OS_INTERFACE if use_mock_openstack_auth else ''), true)
            }}
          OS_IDENTITY_API_VERSION: >-
            {{
              (openrc_exports_text | regex_findall('(?m)^export OS_IDENTITY_API_VERSION=(.*)$') | first)
              | default((openstack_mock_auth.OS_IDENTITY_API_VERSION if use_mock_openstack_auth else ''), true)
            }}

    - name: Show lecture context
      ansible.builtin.debug:
        msg:
          - "id={{ lecture_id }}"
          - "title={{ lecture_title }}"
          - "reference_playbook={{ reference_playbook }}"
          - "install_enabled={{ install_enabled }}"
          - "use_mock_openstack_auth={{ use_mock_openstack_auth }}"
          - "openrc_path={{ openrc_path }}"
          - "openrc_exists={{ openrc_file.stat.exists }}"
          - "effective_os_auth_url={{ openstack_cli_env.OS_AUTH_URL | default('', true) }}"

    - name: Warn when legacy Keystone port is still in use
      ansible.builtin.debug:
        msg:
          - "legacy_os_auth_url_detected={{ openstack_cli_env.OS_AUTH_URL }}"
          - "expected mock auth url from lecture22 openrc"
      when: "'127.0.0.1:5000' in (openstack_cli_env.OS_AUTH_URL | default('', true))"

    - name: Install Codespaces practice packages when enabled
      ansible.builtin.pip:
        requirements: "{{ requirements_file }}"
        virtualenv: "{{ codespaces_venv_path }}"
        virtualenv_command: "python3 -m venv"
      when: install_enabled | bool

    - name: Check Python3 availability
      ansible.builtin.command: python3 --version
      register: python_version
      changed_when: false
      failed_when: false

    - name: Print Python3 version
      ansible.builtin.debug:
        var: python_version.stdout

    - name: Check mock Keystone endpoint
      ansible.builtin.uri:
        url: "{{ openstack_cli_env.OS_AUTH_URL }}"
        return_content: true
      register: keystone_endpoint_check
      changed_when: false
      failed_when: false

    - name: Print mock Keystone summary
      ansible.builtin.debug:
        msg:
          - "keystone_http_status={{ keystone_endpoint_check.status | default('n/a', true) }}"
          - "keystone_endpoint_ok={{ keystone_endpoint_check.status == 200 if keystone_endpoint_check.status is defined else false }}"

    - name: Check OpenStack CLI availability
      ansible.builtin.command: "{{ codespaces_venv_path }}/bin/openstack --version"
      register: openstack_version
      changed_when: false
      failed_when: false

    - name: Print OpenStack CLI version
      ansible.builtin.debug:
        msg:
          - "openstack_rc={{ openstack_version.rc }}"
          - "openstack={{ openstack_version.stdout | default(openstack_version.stderr, true) | default('not-installed', true) }}"

    - name: Check OpenStack token issue
      ansible.builtin.command:
        argv:
          - "{{ codespaces_venv_path }}/bin/openstack"
          - token
          - issue
          - -f
          - value
          - -c
          - expires
      register: openstack_token_issue
      changed_when: false
      failed_when: false
      environment: "{{ openstack_cli_env }}"

    - name: Print OpenStack token summary
      ansible.builtin.debug:
        msg:
          - "token_rc={{ openstack_token_issue.rc }}"
          - "token_result={{ openstack_token_issue.stdout | default(openstack_token_issue.stderr, true) | default('auth-not-configured', true) }}"

    - name: Check Nova compute services
      ansible.builtin.command:
        argv:
          - "{{ codespaces_venv_path }}/bin/openstack"
          - compute
          - service
          - list
          - -f
          - value
          - -c
          - Binary
          - -c
          - Host
          - -c
          - State
          - -c
          - Status
      register: nova_compute_services
      changed_when: false
      failed_when: false
      environment: "{{ openstack_cli_env }}"

    - name: Print Nova compute services
      ansible.builtin.debug:
        msg:
          - "nova_service_rc={{ nova_compute_services.rc }}"
          - "nova_services={{ nova_compute_services.stdout_lines | default([nova_compute_services.stderr | default('nova-service-check-failed', true)], true) }}"

    - name: Check Nova hypervisors
      ansible.builtin.command:
        argv:
          - "{{ codespaces_venv_path }}/bin/openstack"
          - hypervisor
          - list
          - -f
          - value
          - -c
          - 'Hypervisor Hostname'
          - -c
          - State
          - -c
          - Status
      register: nova_hypervisors
      changed_when: false
      failed_when: false
      environment: "{{ openstack_cli_env }}"

    - name: Print Nova hypervisors
      ansible.builtin.debug:
        msg:
          - "hypervisor_rc={{ nova_hypervisors.rc }}"
          - "hypervisors={{ nova_hypervisors.stdout_lines | default([nova_hypervisors.stderr | default('hypervisor-check-failed', true)], true) }}"

    - name: Query Nova servers detail (compute1/compute2)
      ansible.builtin.uri:
        url: "{{ openstack_cli_env.OS_AUTH_URL | regex_replace('/v3$', '/v2.1/servers/detail') }}"
        return_content: true
      register: nova_servers_detail
      changed_when: false
      failed_when: false

    - name: Query Neutron networks
      ansible.builtin.uri:
        url: "{{ openstack_cli_env.OS_AUTH_URL | regex_replace('/v3$', '/v2.0/networks') }}"
        return_content: true
      register: neutron_networks
      changed_when: false
      failed_when: false

    - name: Query Cinder volumes detail
      ansible.builtin.uri:
        url: "{{ openstack_cli_env.OS_AUTH_URL | regex_replace('/v3$', '/v3/project-admin/volumes/detail') }}"
        return_content: true
      register: cinder_volumes
      changed_when: false
      failed_when: false

    - name: Build lecture21 infra summary
      ansible.builtin.set_fact:
        lecture21_servers: "{{ nova_servers_detail.json.servers | default([], true) }}"
        lecture21_networks: "{{ neutron_networks.json.networks | default([], true) }}"
        lecture21_volumes: "{{ cinder_volumes.json.volumes | default([], true) }}"

    - name: Print compute/network/storage summary
      ansible.builtin.debug:
        msg:
          - "servers={{ lecture21_servers | map(attribute='name') | list }}"
          - "networks={{ lecture21_networks | map(attribute='name') | list }}"
          - "volumes={{ lecture21_volumes | map(attribute='name') | list }}"
          - "compute1_network={{ (lecture21_servers | selectattr('name', 'equalto', 'compute1') | map(attribute='addresses') | list | first).keys() | list | first | default('n/a', true) }}"
          - "compute2_network={{ (lecture21_servers | selectattr('name', 'equalto', 'compute2') | map(attribute='addresses') | list | first).keys() | list | first | default('n/a', true) }}"

    - name: Validate 2 computes and split network/storage design
      ansible.builtin.assert:
        that:
          - lecture21_servers | length >= 2
          - "'compute1' in (lecture21_servers | map(attribute='name') | list)"
          - "'compute2' in (lecture21_servers | map(attribute='name') | list)"
          - "'net-compute1' in (lecture21_networks | map(attribute='name') | list)"
          - "'net-compute2' in (lecture21_networks | map(attribute='name') | list)"
          - "'vol-compute1' in (lecture21_volumes | map(attribute='name') | list)"
          - "'vol-compute2' in (lecture21_volumes | map(attribute='name') | list)"
        fail_msg: "compute 2대, neutron 분리 네트워크, cinder 볼륨 연결 검증에 실패했습니다."
        success_msg: "compute1/compute2 + neutron 분리 네트워크 + cinder 볼륨 연결 구성이 확인되었습니다."

    - name: Print Horizon dashboard URL
      ansible.builtin.debug:
        msg:
          - "horizon_dashboard=http://127.0.0.1:{{ mock_keystone_port }}/dashboard"
