course:
  name: Ansible-OpenStack Compact Lab (20 Lectures)
  language: ko-KR
  total_lectures: 20
  default_inventory: ../../ansible/inventories/local/hosts.ini
  policy:
    - 모든 강의는 메인 폴더의 lecture01~lecture20 경로를 사용한다.
    - 강의 실행은 install_enabled=false/true 두 모드로 검증한다.
    - 실습 로그와 회고 노트를 강의별로 남긴다.
modules:
  - range: lecture01-lecture06
    name: Ansible Foundation
    outcome: 인벤토리/변수/템플릿/Role/검증 자동화 기초 확보
  - range: lecture07-lecture10
    name: Ansible Operations
    outcome: 서비스 운영 자동화(Nginx/Docker/Compose) 실습
  - range: lecture11-lecture12
    name: Cloud Bridge
    outcome: AWS 운영 모델과 OpenStack 전환 관점 연결
  - range: lecture13-lecture17
    name: OpenStack Foundation
    outcome: Keystone/Glance/Nova/Neutron/Cinder 핵심 흐름 이해
  - range: lecture18-lecture20
    name: OpenStack Operations
    outcome: Horizon/Kolla Ansible/Runbook 기반 운영 절차 완성
lectures:
  - id: lecture01
    title: 'Ansible 학습환경 점검과 실행 루틴 정립'
    module: ansible_foundation
    folder: ../../lecture01
    lecture_file: ../../lecture01/lecture.yml
    playbook_file: ../../lecture01/playbook.yml
    reference_playbook: ../../ansible/playbooks/00_ping.yml
  - id: lecture02
    title: 'Inventory/Variables 구조 설계'
    module: ansible_foundation
    folder: ../../lecture02
    lecture_file: ../../lecture02/lecture.yml
    playbook_file: ../../lecture02/playbook.yml
    reference_playbook: ../../ansible/playbooks/00_bootstrap.yml
  - id: lecture03
